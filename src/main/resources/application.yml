server:
  port: 8080

spring:
  application:
    name: testcase-generator-server
  datasource:
    url: jdbc:h2:file:./data/testcase-history;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

app:
  ai:
    provider: gemini        # claude | gemini
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

anthropic:
  base-url: https://api.anthropic.com
  api-key: ${ANTHROPIC_API_KEY:}
  version: 2023-06-01
  model: claude-opus-4-6
  max-tokens: 4096

gemini:
  base-url: https://generativelanguage.googleapis.com
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
  max-tokens: 4096

logging:
  level:
    com.testcasegenerator: DEBUG
