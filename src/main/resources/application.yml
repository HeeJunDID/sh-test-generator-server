server:
  port: 8080

spring:
  application:
    name: testcase-generator-server

anthropic:
  base-url: https://api.anthropic.com
  api-key: ${ANTHROPIC_API_KEY}
  version: 2023-06-01
  model: claude-opus-4-6
  max-tokens: 4096

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.testcasegenerator: DEBUG
