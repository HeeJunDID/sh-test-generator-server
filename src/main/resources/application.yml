server:
  port: 8080

spring:
  application:
    name: testcase-generator-server
  datasource:
    url: jdbc:h2:file:./data/testcase-history;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

app:
  ai:
    provider: dify          # claude | gemini | dify
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  jwt:
    secret: ${JWT_SECRET:testcase-generator-jwt-secret-key-min-32-chars!!}
    expiration: 86400000    # 24h in ms

anthropic:
  base-url: https://api.anthropic.com
  api-key: ${ANTHROPIC_API_KEY:}
  version: 2023-06-01
  model: claude-opus-4-6
  max-tokens: 4096

gemini:
  base-url: https://generativelanguage.googleapis.com
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
  max-tokens: 4096

dify:
  base-url: http://43.202.110.99:8080
  api-key: ${DIFY_API_KEY:app-qZDXzzJpqf8rk52aMHEllp9p}

logging:
  level:
    com.testcasegenerator: DEBUG
